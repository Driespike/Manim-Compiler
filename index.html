<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manim Renderer</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #252840;
      --border: #2e3155;
      --accent: #6c63ff;
      --accent-hover: #8a84ff;
      --green: #3ecf8e;
      --red: #ff5c5c;
      --text: #e8eaf6;
      --muted: #7b80a0;
      --radius: 12px;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }

    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    header span { font-size: 0.8rem; color: var(--muted); margin-left: 2px; }

    .badge {
      margin-left: auto;
      background: rgba(108,99,255,0.15);
      color: var(--accent);
      border: 1px solid rgba(108,99,255,0.3);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 100%;
    }

    /* ── Left panel ── */
    .editor-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 73px);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .panel-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
    }

    .quality-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

    .quality-group {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .quality-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quality-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .quality-btn:hover:not(.active) { color: var(--text); background: var(--border); }

    #runBtn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 22px;
      background: linear-gradient(135deg, var(--accent), #8a84ff);
      border: none;
      border-radius: 9px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(108,99,255,0.35);
    }

    #runBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.45); }
    #runBtn:active { transform: translateY(0); }
    #runBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #runBtn .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #runBtn.loading .spinner { display: block; }
    #runBtn.loading .btn-icon { display: none; }

    textarea#codeInput {
      flex: 1;
      background: var(--bg);
      color: #c9d1d9;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 20px 24px;
      tab-size: 4;
    }

    /* ── Right panel ── */
    .output-panel {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 73px);
      background: var(--bg);
    }

    .output-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 24px;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0.4;
    }

    .placeholder-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px dashed var(--muted);
      display: grid; place-items: center;
      font-size: 28px;
    }

    .placeholder p { font-size: 0.9rem; color: var(--muted); text-align: center; line-height: 1.5; }

    #videoContainer { width: 100%; max-width: 640px; display: none; flex-direction: column; gap: 16px; }

    #videoEl {
      width: 100%;
      border-radius: var(--radius);
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .video-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .action-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }

    .action-btn.primary {
      background: var(--green);
      color: #0f1117;
    }
    .action-btn.primary:hover { background: #5de8a8; }

    .action-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .action-btn.secondary:hover { background: var(--border); }

    /* ── Error / log panel ── */
    #logPanel {
      border-top: 1px solid var(--border);
      background: var(--surface);
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .log-header.error { color: var(--red); }
    .log-header.success { color: var(--green); }

    #logContent {
      padding: 14px 20px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Status bar ── */
    #statusBar {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
    }

    #statusBar .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    #statusBar.running .status-dot { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    #statusBar.success .status-dot { background: var(--green); }
    #statusBar.error .status-dot { background: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      .editor-panel, .output-panel { height: auto; min-height: 50vh; }
      .editor-panel { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎬</div>
  <h1>Manim Renderer <span>/ Studio</span></h1>
  <div class="badge">BETA</div>
</header>

<main>
  <!-- ── Editor ── -->
  <section class="editor-panel">
    <div class="panel-header">
      <div class="dot"></div>
      scene.py
    </div>
    <div class="controls">
      <span class="quality-label">Quality</span>
      <div class="quality-group">
        <button class="quality-btn" data-q="l">Low</button>
        <button class="quality-btn active" data-q="m">Medium</button>
        <button class="quality-btn" data-q="h">High</button>
        <button class="quality-btn" data-q="k">4K</button>
      </div>
      <button id="runBtn">
        <div class="spinner"></div>
        <span class="btn-icon">▶</span>
        Run
      </button>
    </div>
    <textarea id="codeInput" spellcheck="false" placeholder="# Paste your Manim scene here...">from manim import *

class HelloWorld(Scene):
    def construct(self):
        text = Text("Hello, Manim!", font_size=72)
        text.set_color_by_gradient(BLUE, PURPLE)
        self.play(Write(text), run_time=2)
        self.wait(1)
        self.play(text.animate.scale(0.5).to_edge(UP))

        eq = MathTex(r"e^{i\pi} + 1 = 0", font_size=60)
        self.play(FadeIn(eq, shift=UP))
        self.wait(2)
</textarea>
  </section>

  <!-- ── Output ── -->
  <section class="output-panel">
    <div class="panel-header">
      <div class="dot" style="background:var(--green)"></div>
      Output
    </div>

    <div class="output-inner">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🎥</div>
        <p>Your rendered video<br>will appear here</p>
      </div>

      <div id="videoContainer">
        <video id="videoEl" controls></video>
        <div class="video-actions">
          <a id="downloadBtn" class="action-btn primary" download="render.mp4">⬇ Download MP4</a>
          <button class="action-btn secondary" id="clearBtn">✕ Clear</button>
        </div>
      </div>
    </div>

    <div id="logPanel">
      <div class="log-header" id="logHeader">Log</div>
      <pre id="logContent"></pre>
    </div>

    <div id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">Ready</span>
    </div>
  </section>
</main>

<script>
  const runBtn      = document.getElementById('runBtn');
  const codeInput   = document.getElementById('codeInput');
  const videoEl     = document.getElementById('videoEl');
  const videoContainer = document.getElementById('videoContainer');
  const placeholder = document.getElementById('placeholder');
  const logPanel    = document.getElementById('logPanel');
  const logHeader   = document.getElementById('logHeader');
  const logContent  = document.getElementById('logContent');
  const statusBar   = document.getElementById('statusBar');
  const statusText  = document.getElementById('statusText');
  const downloadBtn = document.getElementById('downloadBtn');
  const clearBtn    = document.getElementById('clearBtn');

  let selectedQuality = 'm';
  let startTime = null;

  // Quality buttons
  document.querySelectorAll('.quality-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQuality = btn.dataset.q;
    });
  });

  function setStatus(state, msg) {
    statusBar.className = state;
    statusText.textContent = msg;
  }

  function showLog(type, message) {
    logPanel.style.display = 'block';
    logHeader.className = `log-header ${type}`;
    logHeader.textContent = type === 'error' ? '✖ Error' : '✔ Log';
    logContent.textContent = message;
  }

  function hideLog() {
    logPanel.style.display = 'none';
  }

  function showVideo(url) {
    placeholder.style.display = 'none';
    videoContainer.style.display = 'flex';
    videoEl.src = url + '?t=' + Date.now(); // cache-bust
    videoEl.load();
    downloadBtn.href = url;
  }

  function resetOutput() {
    placeholder.style.display = 'flex';
    videoContainer.style.display = 'none';
    videoEl.src = '';
    hideLog();
    setStatus('', 'Ready');
  }

  clearBtn.addEventListener('click', resetOutput);

  // Tab key support in textarea
  codeInput.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = codeInput.selectionStart;
      const v = codeInput.value;
      codeInput.value = v.substring(0, s) + '    ' + v.substring(codeInput.selectionEnd);
      codeInput.selectionStart = codeInput.selectionEnd = s + 4;
    }
    // Ctrl/Cmd + Enter to run
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runScene();
  });

  runBtn.addEventListener('click', runScene);

  async function runScene() {
    const code = codeInput.value.trim();
    if (!code) {
      showLog('error', 'Please enter some Manim code first.');
      return;
    }

    runBtn.disabled = true;
    runBtn.classList.add('loading');
    hideLog();
    setStatus('running', 'Rendering…');
    startTime = Date.now();

    const timer = setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      setStatus('running', `Rendering… ${elapsed}s`);
    }, 100);

    try {
      const res = await fetch('/render', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, quality: selectedQuality }),
      });

      clearInterval(timer);
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        const detail = typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail, null, 2);
        showLog('error', detail);
        setStatus('error', `Failed after ${elapsed}s`);
        return;
      }

      const data = await res.json();
      showVideo(data.url);
      showLog('success', `✔ Scene "${data.scene}" rendered in ${elapsed}s\n${data.url}`);
      setStatus('success', `Done in ${elapsed}s`);

    } catch (err) {
      clearInterval(timer);
      showLog('error', `Network error: ${err.message}`);
      setStatus('error', 'Network error');
    } finally {
      runBtn.disabled = false;
      runBtn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
